<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista della Spesa — Reset Infiammatorio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      padding: 1rem;
      color: #1a1a1a;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #e5e5e0;
      overflow: hidden;
    }

    .header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid #e5e5e0;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -0.01em;
    }
    .header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 1rem 1.5rem 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #e0e0e0;
      background: #fff;
      color: #888;
      white-space: nowrap;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }
    .tab:hover:not(.active) { background: #f5f5f0; }

    .week-content { padding: 1rem 1.5rem 1.5rem; }

    .week-header { margin-bottom: 0.75rem; }
    .week-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
    .week-sub { font-size: 12px; color: #aaa; font-style: italic; margin-top: 3px; line-height: 1.4; }

    .progress-bar {
      height: 3px;
      background: #e5e5e0;
      border-radius: 2px;
      margin: 10px 0 1.25rem;
    }
    .progress-fill {
      height: 100%;
      background: #1a1a1a;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .category { margin-bottom: 1.25rem; }
    .cat-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 6px;
      padding-bottom: 5px;
      border-bottom: 1px solid #f0f0ec;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      border: 1.5px solid #ccc;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      background: #fff;
    }
    .checkbox.checked {
      background: #1a1a1a;
      border-color: #1a1a1a;
    }
    .checkbox.checked::after {
      content: '';
      width: 9px;
      height: 5px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translate(1px, -1px);
      display: block;
    }

    .item-text {
      font-size: 14px;
      color: #444;
      line-height: 1.4;
      transition: color 0.15s;
      flex: 1;
    }
    .item-text.checked {
      text-decoration: line-through;
      color: #bbb;
    }

    .new-badge {
      font-size: 10px;
      color: #999;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 1px 6px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      border-top: 1px solid #e5e5e0;
    }
    .count { font-size: 12px; color: #aaa; }
    .reset-btn {
      font-size: 12px;
      color: #aaa;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      text-decoration: underline;
      font-family: inherit;
    }
    .reset-btn:hover { color: #1a1a1a; }

    .branding {
      text-align: center;
      padding: 1rem;
      font-size: 11px;
      color: #ccc;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Lista della spesa</h1>
    <p>Reset Infiammatorio — seleziona la settimana e spunta mentre fai la spesa</p>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="week-content" id="content"></div>
  <div class="footer">
    <span class="count" id="count"></span>
    <button class="reset-btn" onclick="resetWeek()">Azzera spunta</button>
  </div>
</div>

<div class="branding">Reset Infiammatorio</div>

    ]
  },
  {
    num: 2,
    title: "Settimana 2 — Stabilizzare e proteggere",
    sub: "Gli alimenti con ✦ sono nuovi rispetto alla settimana 1",
    categories: [
      { name: "Proteine", items: [
        "Filetti di pesce bianco (platessa, sogliola o merluzzo)",
        "Petto di pollo o tacchino",
        "Uova",
        "Tofu morbido",
        {t:"Salmone affumicato", n:true},
        {t:"Sgombro al naturale in barattolo", n:true},
        {t:"Tonno al naturale in barattolo", n:true}
      ]},
      { name: "Cereali e legumi", items: [
        "Avena (fiocchi)",
        "Riso integrale",
        "Quinoa",
        "Farro integrale",
        "Ceci (secchi o in barattolo)",
        "Orzo perlato",
        {t:"Lenticchie rosse", n:true},
        {t:"Piadina integrale", n:true}
      ]},
      { name: "Verdure", items: [
        "Zucchine · Carote · Broccoli · Spinaci · Finocchio",
        "Zucca · Porri · Patate dolci",
        {t:"Cavolo nero", n:true},

      ]},

      { name: "Grassi e semi", items: [

    categories: [

      { name: "Cereali e legumi", items: [

  },
  {
    num: 4,
    title: "Settimana 4 — Integrare e rendere sostenibile",
    sub: "Gli alimenti con ✦ sono le reintroduzioni da testare",
    categories: [
      { name: "Proteine", items: [
        "Filetti di pesce bianco · Pollo · Uova · Tofu",
        "Salmone · Sgombro · Tonno · Sardine",
        "Kefir"
      ]},
      { name: "Cereali e legumi", items: [
        "Avena · Riso integrale · Quinoa · Farro · Orzo",
        "Ceci · Lenticchie · Edamame",
        {t:"Pasta integrale", n:true},
        {t:"Pane di segale integrale", n:true}
      ]},
      { name: "Fermentati e prebiotici", items: [

        "Cipolla · Aglio · Porro · Asparagi · Cicoria",
        "Banane leggermente acerbe"
      ]},
      { name: "Verdure e frutta", items: [
        "Tutte le verdure delle settimane precedenti",
        {t:"Cavolo riccio (kale)", n:true},
        {t:"Germogli di alfa-alfa", n:true},
        "Mirtilli · Frutti di bosco · Mela · Pera · Banana"
      ]},
      { name: "Grassi e semi", items: [
        "Olio extravergine · Noci · Mandorle · Nocciole",
        "Semi di lino · Zucca · Chia · Canapa",
        "Burro di mandorle · Tahini"
      ]},
      { name: "Latticini — reintroduci uno alla volta", items: [
        "Yogurt bianco intero · Yogurt greco · Kefir",
        {t:"Parmigiano o pecorino — testa per primo", n:true},
        {t:"Ricotta · Formaggio fresco", n:true},
        {t:"Latte intero — testa per ultimo", n:true}
      ]},
      { name: "Dispensa", items: [
        "Zenzero · Curcuma · Limoni · Brodo",
        "Hummus · Cioccolato fondente min. 85%",
        {t:"Datteri", n:true},
        {t:"Cardamomo in polvere", n:true}
      ]}
    ]
  }
];

let currentWeek = 0;
const checked = {};

function getKey(w, c, i) { return w + '-' + c + '-' + i; }

function getAllKeys() {
  const w = weeks[currentWeek];
  const keys = [];
  w.categories.forEach(function(cat, ci) {
    cat.items.forEach(function(_, ii) { keys.push(getKey(currentWeek, ci, ii)); });
  });
  return keys;
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = weeks.map(function(w, i) {
    return '<div class="tab ' + (i === currentWeek ? 'active' : '') + '" onclick="selectWeek(' + i + ')">Settimana ' + w.num + '</div>';
  }).join('');
}

function renderContent() {
  var w = weeks[currentWeek];
  var allKeys = getAllKeys();
  var checkedCount = allKeys.filter(function(k) { return checked[k]; }).length;
  var pct = allKeys.length ? Math.round(checkedCount / allKeys.length * 100) : 0;

  var html = '<div class="week-header"><div class="week-title">' + w.title + '</div><div class="week-sub">' + w.sub + '</div></div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';

  w.categories.forEach(function(cat, ci) {
    html += '<div class="category"><div class="cat-label">' + cat.name + '</div>';
    cat.items.forEach(function(item, ii) {
      var text = typeof item === 'string' ? item : item.t;
      var isNew = typeof item === 'object' && item.n;
      var key = getKey(currentWeek, ci, ii);
      var isChecked = !!checked[key];
      html += '<div class="item" onclick="toggle(\'' + key + '\')">';
      html += '<div class="checkbox ' + (isChecked ? 'checked' : '') + '"></div>';
      html += '<span class="item-text ' + (isChecked ? 'checked' : '') + '">' + text + '</span>';
      if (isNew) html += '<span class="new-badge">✦ nuovo</span>';
      html += '</div>';
    });
    html += '</div>';
  });

  document.getElementById('content').innerHTML = html;
  document.getElementById('count').textContent = checkedCount + ' di ' + allKeys.length + ' selezionati';
}

function toggle(key) {
  checked[key] = !checked[key];
  renderContent();
}

function selectWeek(i) {
  currentWeek = i;
  renderTabs();
  renderContent();
}

function resetWeek() {
  getAllKeys().forEach(function(k) { delete checked[k]; });
  renderContent();
}

renderTabs();
renderContent();
</script>
</body>
</html>
